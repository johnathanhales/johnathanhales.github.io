<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Johnathan Hales — Portfolio</title>
  <meta name="description" content="Code, 3D art, music, and visuals by Johnathan Hales, also known as &quot;Hopeless Judas.&quot;" />
  <meta property="og:title" content="Johnathan Hales — Portfolio" />
  <meta property="og:description" content="Code, 3D art, music, and visuals by Hopeless Judas." />
  <meta property="og:type" content="website" />
  <meta name="color-scheme" content="light dark" />
  <style>
    :root{
      --bg:#0f0f12;--fg:#ececf1;--muted:#a2a9b0;--card:#17171c;--accent:#86e1ff;--accent-2:#a7ff86;--border:#26262c
    }
    @media (prefers-color-scheme: light){
      :root{--bg:#f7f8fa;--fg:#16181d;--muted:#5b6470;--card:#ffffff;--accent:#006eff;--accent-2:#0aa66e;--border:#e7e9ee}
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Inter,Ubuntu,"Helvetica Neue",Arial,sans-serif}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    header{display:flex;gap:16px;align-items:center;justify-content:space-between;padding:16px 0}
    nav{display:flex;gap:14px;flex-wrap:wrap}
    nav a{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(0,0,0,0.04))}
    .hero{display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:center;padding:12px 0 28px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
    .col-6{grid-column:span 6}
    .col-4{grid-column:span 4}
    .col-12{grid-column:span 12}
    .tag{display:inline-block;padding:2px 10px;border:1px solid var(--border);border-radius:999px;color:var(--muted
